<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Commissions for Lemuen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="petal-layer" aria-hidden="true"></div>

    <main class="page-shell">
      <header class="hero">
        <p class="hero-kicker">Curated Gallery</p>
        <h1>Personal Commissions for Lemuen</h1>
        <p class="hero-copy">
          A huge thanks to all the artists below for creating such exquisite
          works for Lemuen.
        </p>
      </header>

      <div id="gallery-root" class="sections"></div>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Close viewer">
        Close
      </button>
      <button
        class="lightbox-nav lightbox-prev"
        type="button"
        aria-label="Previous image"
      >
        ‹
      </button>
      <figure class="lightbox-figure">
        <img id="lightbox-image" alt="" />
        <figcaption class="lightbox-meta">
          <span id="lightbox-title"></span>
          <span id="lightbox-counter"></span>
        </figcaption>
      </figure>
      <button
        class="lightbox-nav lightbox-next"
        type="button"
        aria-label="Next image"
      >
        ›
      </button>
    </div>

    <script src="gallery-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
